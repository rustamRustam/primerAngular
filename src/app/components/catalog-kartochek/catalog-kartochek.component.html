  <div class="paths">
    
    @if (filters) {
      <div class="path-left">
        <div class="paths-title"><h2>Сортировка</h2></div>
        <app-name class="filter-item"
          [disabled]="dataTotalCount === -1"
          [value]="filters.q"
          [updateFilter]="updateFilter"
        ></app-name>
        <app-select-checkbox
          title="Художник"
          [disabled]="dataTotalCount === -1"
          [current]="filters.authorId"
          [variants]="authorsToSelectItems()"
          [updateFilter]="updateFilter"
          nameFilter="authorId"
        ></app-select-checkbox>

        <app-select-checkbox
          title="Локация"
          [disabled]="dataTotalCount === -1"
          [current]="filters.locationId"
          [variants]="locationsToSelectItems()"
          [updateFilter]="updateFilter"
          nameFilter="locationId"
        ></app-select-checkbox>
      </div>
    }
    <div class="path-right">
      <div class="pagination">
        <app-numeraciya
          [dataNumeraciya]="dataNumeraciya"
          [updateFilter]="updateFilter"
        ></app-numeraciya>
      </div>
      <app-vitrina
        [dataTotalCount]="dataTotalCount"
        [dataKartochkas]="dataKartochkas"

      ></app-vitrina>

      <div class="pagination">
        <app-numeraciya
          [dataNumeraciya]="dataNumeraciya"
          [updateFilter]="updateFilter"
        ></app-numeraciya>
      </div>
    </div>
  </div>
</div>
