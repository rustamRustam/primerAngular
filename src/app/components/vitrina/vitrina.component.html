@if (dataKartochkas?.length) {
  <div class="container-Vitrina"
    >
    @for (itemKartochka of dataKartochkas; track itemKartochka.id) {
      <app-kartocheka
        [dataKartocheka]="itemKartochka"
      ></app-kartocheka>
    }
  </div>
} @else {
  @if (dataTotalCount < 0) {
    <app-loading></app-loading>
  } @else {
    <div class="text-empty">{{ emltyText }}</div>
  }
}
